  <rect x="0" y="634" width="1200" height="56" fill="#FFFFFF"/>
  <rect x="0" y="634" width="1200" height="1" fill="#E3E8EF"/>
  <g text-anchor="middle">
    <text x="160" y="662" font-size="13" font-weight="700" fill="#1C3D5A">🏠</text>
    <text x="160" y="680" font-size="11" font-weight="700" fill="#1C3D5A">首頁</text>
    <text x="400" y="662" font-size="13" fill="#9AA6B2">💼</text>
    <text x="400" y="680" font-size="11" fill="#9AA6B2">持倉</text>
    <text x="600" y="662" font-size="13" fill="#9AA6B2">⭐</text>
    <text x="600" y="680" font-size="11" fill="#9AA6B2">自選</text>
    <text x="800" y="662" font-size="13" fill="#9AA6B2">🧭</text>
    <text x="800" y="680" font-size="11" fill="#9AA6B2">探索</text>
    <text x="1040" y="662" font-size="13" fill="#9AA6B2">🎓</text>
    <text x="1040" y="680" font-size="11" fill="#9AA6B2">學</text>
