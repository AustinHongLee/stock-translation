    <rect x="410" y="465" width="120" height="9" rx="4" fill="#EEF1F5"/><rect x="410" y="465" width="54" height="9" rx="4" fill="#2C5475"/>
    <text x="540" y="474" fill="#6B7785" font-size="12" text-anchor="end">22%</text>

    <text x="44" y="510" fill="#1A1F26">2412 中華電</text>
    <text x="300" y="510" fill="#E03131" font-weight="700">+3.1% ▲</text>
    <rect x="410" y="501" width="120" height="9" rx="4" fill="#EEF1F5"/><rect x="410" y="501" width="44" height="9" rx="4" fill="#2C5475"/>
    <text x="540" y="510" fill="#6B7785" font-size="12" text-anchor="end">18%</text>

    <text x="44" y="546" fill="#1A1F26">3008 大立光</text>
    <text x="300" y="546" fill="#2F9E44" font-weight="700">-7.6% ▼</text>
    <rect x="410" y="537" width="120" height="9" rx="4" fill="#EEF1F5"/><rect x="410" y="537" width="29" height="9" rx="4" fill="#7E97AB"/>
    <text x="540" y="546" fill="#6B7785" font-size="12" text-anchor="end">12%</text>
  </g>
  <rect x="44" y="572" width="492" height="32" rx="8" fill="#F1F5F9"/>
  <text x="290" y="593" font-size="12.5" fill="#46535F" text-anchor="middle">… 再 5 檔　·　含息總報酬 +18.7%　·　年化 12.3%</text>

