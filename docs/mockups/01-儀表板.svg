  <text x="616" y="236" font-size="13.5" fill="#33404C">✅  你有 1 筆交易還沒寫買進筆記</text>

  <!-- ===== 今日晨報 ===== -->
  <rect x="24" y="266" width="1152" height="92" rx="12" fill="#FFFFFF" stroke="#E9EDF2" filter="url(#shadow)"/>
  <text x="44" y="294" font-size="13" font-weight="700" fill="#1C3D5A">📰 今日晨報（AI 一句話）</text>
  <text x="44" y="320" font-size="14" fill="#33404C">你的持股昨日多數收紅，半導體領漲；台積電 +1.2% 帶動你的組合 +0.47%。需要留意大立光跌破季線，</text>
  <text x="44" y="342" font-size="14" fill="#33404C">屬技術面轉弱訊號，詳見風險中心。</text>
  <text x="1156" y="342" font-size="11" fill="#9AA6B2" text-anchor="end">ⓘ 資料解讀，非投資建議</text>

