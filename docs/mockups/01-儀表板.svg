  <text x="616" y="130" font-size="13" font-weight="700" fill="#1C3D5A">今日待辦 / 警示</text>
  <text x="616" y="158" font-size="13.5" fill="#33404C">🔔  2412 中華電 後天除息(每股配 4.7)</text>
  <text x="616" y="184" font-size="13.5" fill="#33404C">⚠️  3008 大立光 跌破季線(技術轉弱訊號)</text>
