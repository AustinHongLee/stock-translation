    <text x="1156" y="438" fill="#E03131" font-weight="700" text-anchor="end">▲ +2.1%</text>
    <text x="616" y="474" fill="#1A1F26">1216 統一</text>
    <text x="1156" y="474" fill="#2F9E44" font-weight="700" text-anchor="end">▼ -0.4%</text>
    <text x="616" y="510" fill="#1A1F26">2603 長榮</text>
    <rect x="700" y="498" width="56" height="18" rx="9" fill="#FFF0E6"/>
    <text x="728" y="511" font-size="11" fill="#E8590C" text-anchor="middle">🔥 異動</text>
    <text x="1156" y="510" fill="#E03131" font-weight="700" text-anchor="end">▲ +3.8%</text>
    <text x="616" y="546" fill="#1A1F26">2884 玉山金</text>
    <text x="1156" y="546" fill="#E03131" font-weight="700" text-anchor="end">▲ +0.9%</text>
