      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1C3D5A" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="sparkUp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E03131" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#E03131" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="690" fill="#EDF0F4"/>

  <!-- ===== 頂部列 ===== -->
  <rect x="0" y="0" width="1200" height="56" fill="#FFFFFF"/>
  <rect x="0" y="55" width="1200" height="1" fill="#E3E8EF"/>
  <text x="24" y="35" font-size="18" font-weight="700" fill="#1C3D5A">📈 投資作業系統</text>
  <rect x="300" y="14" width="420" height="28" rx="14" fill="#F1F4F8" stroke="#E3E8EF"/>
  <text x="318" y="33" font-size="13" fill="#9AA6B2">🔍  搜尋股票 / 代號…</text>
  <!-- 模式切換 -->
  <rect x="876" y="14" width="150" height="28" rx="14" fill="#F1F4F8" stroke="#E3E8EF"/>
  <text x="892" y="32" font-size="12" fill="#1C3D5A" font-weight="700">新手</text>
  <circle cx="960" cy="28" r="9" fill="#1C3D5A"/>
  <rect x="946" y="22" width="28" height="12" rx="6" fill="#C7D2DD"/>
  <circle cx="952" cy="28" r="8" fill="#FFFFFF" stroke="#1C3D5A" stroke-width="1.5"/>
  <text x="982" y="32" font-size="12" fill="#9AA6B2">進階</text>
  <text x="1052" y="34" font-size="17">🙈</text>
  <text x="1092" y="34" font-size="16">⚙️</text>
  <text x="1132" y="34" font-size="17">🤖</text>

  <!-- ===== 問候 + 大盤 ===== -->
  <text x="24" y="86" font-size="15" fill="#46535F">早安,今天是 6/15(一)。開盤前先看這些 👇</text>
  <text x="1176" y="86" font-size="14" fill="#46535F" text-anchor="end">大盤 加權 <tspan font-weight="700" fill="#E03131">22,140 ▲ 0.8%</tspan></text>

  <!-- ===== 總資產卡 ===== -->
  <rect x="24" y="100" width="556" height="150" rx="12" fill="#FFFFFF" stroke="#E9EDF2" filter="url(#shadow)"/>
  <text x="44" y="130" font-size="13" fill="#6B7785">我的總資產</text>
  <text x="146" y="131" font-size="13">🙈</text>
  <text x="44" y="168" font-size="30" font-weight="800" fill="#1A1F26">NT$ 2,640,500</text>
  <text x="44" y="198" font-size="16" font-weight="700" fill="#E03131">今日 ▲ +12,300 (+0.47%)</text>
  <text x="44" y="224" font-size="15" fill="#E03131">總報酬 ▲ +18.7%(含息)</text>
  <!-- sparkline -->
  <text x="556" y="130" font-size="11" fill="#9AA6B2" text-anchor="end">近 90 天淨值</text>
  <path d="M376,225 L405,218 L434,222 L463,205 L492,198 L521,182 L550,150 L550,235 L376,235 Z" fill="url(#sparkUp)"/>
  <polyline points="376,225 405,218 434,222 463,205 492,198 521,182 550,150" fill="none" stroke="#E03131" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

