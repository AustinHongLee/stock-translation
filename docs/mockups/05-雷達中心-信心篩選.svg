<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" font-family="'PingFang TC','Microsoft JhengHei','Noto Sans TC','Heiti TC',sans-serif">
  <defs>
    <filter id="s5" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1C3D5A" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1200" height="600" fill="#EDF0F4"/>

  <!-- 頂部列 -->
  <rect x="0" y="0" width="1200" height="56" fill="#FFFFFF"/>
  <rect x="0" y="55" width="1200" height="1" fill="#E3E8EF"/>
  <text x="24" y="35" font-size="18" font-weight="700" fill="#1C3D5A">📈 股票翻譯機</text>
  <text x="1132" y="34" font-size="17">🤖</text>

  <!-- 標題 + 固定聲明 -->
  <text x="24" y="88" font-size="22" font-weight="800" fill="#1A1F26">🎯 雷達中心</text>
  <text x="150" y="88" font-size="12.5" fill="#9AA6B2">這是資料排行榜，不是推薦清單；排行只反映數字，每一檔都需自己進個股頁驗證。不報明牌、不預測股價。</text>

  <!-- 篩選列 -->
  <g font-size="12.5">
    <rect x="24" y="104" width="146" height="28" rx="14" fill="#1C3D5A"/><text x="97" y="123" fill="#FFFFFF" text-anchor="middle">☑ 只看股利法適用</text>
    <rect x="178" y="104" width="150" height="28" rx="14" fill="#1C3D5A"/><text x="253" y="123" fill="#FFFFFF" text-anchor="middle">☑ 排除新上市&lt;3年</text>
    <rect x="336" y="104" width="140" height="28" rx="14" fill="#1C3D5A"/><text x="406" y="123" fill="#FFFFFF" text-anchor="middle">☑ 排除資料不足</text>
    <rect x="484" y="104" width="150" height="28" rx="14" fill="#FFFFFF" stroke="#C7D2DD"/><text x="559" y="123" fill="#46535F" text-anchor="middle">☐ 排除低殖利率</text>
    <rect x="642" y="104" width="138" height="28" rx="14" fill="#FFFFFF" stroke="#C7D2DD"/><text x="711" y="123" fill="#46535F" text-anchor="middle">☐ 排除景氣循環</text>
    <rect x="788" y="104" width="130" height="28" rx="14" fill="#FFFFFF" stroke="#C7D2DD"/><text x="853" y="123" fill="#46535F" text-anchor="middle">最低信心：中 ▾</text>
  </g>

  <!-- ===== 左欄:撿便宜(高信心) ===== -->
  <rect x="24" y="148" width="566" height="222" rx="12" fill="#FFFFFF" stroke="#E9EDF2" filter="url(#s5)"/>
  <text x="44" y="176" font-size="14" font-weight="700" fill="#1C3D5A">撿便宜排行</text>
  <rect x="146" y="163" width="74" height="20" rx="10" fill="#EBFBEE"/>
  <text x="183" y="177" font-size="11" fill="#2B8A3E" text-anchor="middle">🟢 高信心</text>
  <g font-size="13.5">
    <text x="44" y="210" fill="#1A1F26" font-weight="600">1.　2412 中華電</text>
    <text x="330" y="210" fill="#46535F">現價 125.8</text>
    <text x="566" y="210" fill="#2F9E44" text-anchor="end" font-weight="700">低於合理 −4.7%</text>
    <line x1="44" y1="224" x2="566" y2="224" stroke="#F0F2F5"/>
    <text x="44" y="248" fill="#1A1F26" font-weight="600">2.　2882 國泰金</text>
    <text x="330" y="248" fill="#46535F">現價 55.2</text>
    <text x="566" y="248" fill="#2F9E44" text-anchor="end" font-weight="700">低於合理 −3.1%</text>
    <line x1="44" y1="262" x2="566" y2="262" stroke="#F0F2F5"/>
    <text x="44" y="286" fill="#1A1F26" font-weight="600">3.　1101 台泥</text>
    <text x="330" y="286" fill="#46535F">現價 34.1</text>
    <text x="566" y="286" fill="#2F9E44" text-anchor="end" font-weight="700">低於合理 −1.8%</text>
    <line x1="44" y1="300" x2="566" y2="300" stroke="#F0F2F5"/>
    <text x="44" y="324" fill="#1A1F26" font-weight="600">4.　2885 元大金</text>
    <text x="330" y="324" fill="#46535F">現價 25.4</text>
    <text x="566" y="324" fill="#E03131" text-anchor="end" font-weight="700">接近便宜 +2.0%</text>
  </g>
  <rect x="44" y="338" width="522" height="22" rx="11" fill="#F8F4E6"/>
  <text x="305" y="353" font-size="11.5" fill="#9C7A1A" text-anchor="middle">▾ 另有 23 檔「低信心／方法不適用」已收合　〔顯示〕</text>

  <!-- 左欄:低信心區(淡化) -->
  <rect x="24" y="384" width="566" height="170" rx="12" fill="#F1F3F5" stroke="#DEE2E6"/>
  <text x="44" y="412" font-size="13.5" font-weight="700" fill="#868E96">⚠️ 低信心區（僅供參考，估值不可靠）</text>
  <g font-size="13">
    <text x="44" y="444" fill="#495057" font-weight="600">3576 聯合再生</text>
    <text x="200" y="444" fill="#868E96">景氣循環 · 近年虧損</text>
    <text x="566" y="444" fill="#868E96" text-anchor="end">→ 不適合股利法</text>
    <line x1="44" y1="458" x2="566" y2="458" stroke="#E3E6EA"/>
    <text x="44" y="482" fill="#495057" font-weight="600">7722 LINEPAY</text>
    <text x="200" y="482" fill="#868E96">新上市 · 殖利率&lt;1%</text>
    <text x="566" y="482" fill="#868E96" text-anchor="end">→ 資料不足</text>
    <line x1="44" y1="496" x2="566" y2="496" stroke="#E3E6EA"/>
    <text x="44" y="520" fill="#495057" font-weight="600">3661 世芯-KY</text>
    <text x="200" y="520" fill="#868E96">成長股 · 殖利率&lt;1%</text>
    <text x="566" y="520" fill="#868E96" text-anchor="end">→ 改看本益比</text>
  </g>
  <text x="44" y="544" font-size="11" fill="#ADB5BD">這些股票不會出現在主榜，避免「假便宜」誤導。</text>

  <!-- ===== 右欄:高殖利率(正常) ===== -->
  <rect x="608" y="148" width="568" height="222" rx="12" fill="#FFFFFF" stroke="#E9EDF2" filter="url(#s5)"/>
  <text x="628" y="176" font-size="14" font-weight="700" fill="#1C3D5A">高殖利率排行</text>
  <rect x="748" y="163" width="74" height="20" rx="10" fill="#EBFBEE"/>
  <text x="785" y="177" font-size="11" fill="#2B8A3E" text-anchor="middle">🟢 已排陷阱</text>
  <g font-size="13.5">
    <text x="628" y="210" fill="#1A1F26" font-weight="600">1.　2890 永豐金</text>
    <text x="1000" y="210" fill="#46535F" text-anchor="end">配息穩 · 5 年完整</text>
    <text x="1156" y="210" fill="#E03131" text-anchor="end" font-weight="700">5.8%</text>
    <line x1="628" y1="224" x2="1156" y2="224" stroke="#F0F2F5"/>
    <text x="628" y="248" fill="#1A1F26" font-weight="600">2.　2412 中華電</text>
    <text x="1000" y="248" fill="#46535F" text-anchor="end">配息穩 · 5 年完整</text>
    <text x="1156" y="248" fill="#E03131" text-anchor="end" font-weight="700">4.3%</text>
    <line x1="628" y1="262" x2="1156" y2="262" stroke="#F0F2F5"/>
    <text x="628" y="286" fill="#1A1F26" font-weight="600">3.　1101 台泥</text>
    <text x="1000" y="286" fill="#46535F" text-anchor="end">配息穩 · 5 年完整</text>
    <text x="1156" y="286" fill="#E03131" text-anchor="end" font-weight="700">4.0%</text>
    <line x1="628" y1="300" x2="1156" y2="300" stroke="#F0F2F5"/>
    <text x="628" y="324" fill="#1A1F26" font-weight="600">4.　2884 玉山金</text>
    <text x="1000" y="324" fill="#46535F" text-anchor="end">配息穩 · 5 年完整</text>
    <text x="1156" y="324" fill="#E03131" text-anchor="end" font-weight="700">3.9%</text>
  </g>
  <rect x="628" y="338" width="528" height="22" rx="11" fill="#F1F4F8"/>
  <text x="892" y="353" font-size="11.5" fill="#6B7785" text-anchor="middle">殖利率 = 平均現金股利 ÷ 現價，已扣除疑似陷阱者</text>

  <!-- 右欄:疑似陷阱(警示) -->
  <rect x="608" y="384" width="568" height="170" rx="12" fill="#FFF9F9" stroke="#F5C2C2"/>
  <text x="628" y="412" font-size="13.5" font-weight="700" fill="#C92A2A">⚠️ 疑似高殖利率陷阱（高殖利率≠便宜）</text>
  <g font-size="13">
    <text x="628" y="444" fill="#495057" font-weight="600">○○鋼鐵（示意）</text>
    <text x="900" y="444" fill="#C92A2A" text-anchor="end">殖利率 9.2%</text>
    <text x="1156" y="444" fill="#868E96" text-anchor="end">股價大跌造成</text>
    <line x1="628" y1="458" x2="1156" y2="458" stroke="#F3DADA"/>
    <text x="628" y="482" fill="#495057" font-weight="600">○○營建（示意）</text>
    <text x="900" y="482" fill="#C92A2A" text-anchor="end">殖利率 8.1%</text>
    <text x="1156" y="482" fill="#868E96" text-anchor="end">含一次性高股利</text>
    <line x1="628" y1="496" x2="1156" y2="496" stroke="#F3DADA"/>
    <text x="628" y="520" fill="#495057" font-weight="600">○○電子（示意）</text>
    <text x="900" y="520" fill="#C92A2A" text-anchor="end">殖利率 7.4%</text>
    <text x="1156" y="520" fill="#868E96" text-anchor="end">配息率&gt;100% 吃老本</text>
  </g>
  <text x="628" y="544" font-size="11" fill="#B98A8A">這些殖利率高，是因為股價大跌或一次性股利，不是配息變好。</text>
</svg>
